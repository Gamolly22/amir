name: flutter_application_1
description: A new Flutter project.
publish_to: "none"

version: 1.0.0+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.4.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0
  firebase_core: ^4.5.0
  shared_preferences: ^2.2.2
  local_auth: ^3.0.1
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  dio: ^5.8.0+1
  cloud_functions: ^6.0.7
  paymob_payment: ^0.0.1+1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.4.0
  flutter_launcher_icons: ^0.14.4
  
dependency_overrides:
  web: ^0.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path_android: "assets/images/app.png"
  adaptive_icon_background: "#00716B"
  adaptive_icon_foreground: "assets/images/app.png"
  image_path_ios: "assets/images/app.png"
  image_path_ios_dark_transparent: "assets/images/app.png"
  ios: true
  remove_alpha_ios: true
  remove_alpha_channel_ios: true
  background_color_ios: "#00716B"
